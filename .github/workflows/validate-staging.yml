name: Validate Webhook Staging
on:
  push:
    branches:
      - main
    paths:
      - 'scripts/validate-staging.cjs'

jobs:
  validate:
    permissions:
      contents: write
      issues: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install firebase-admin
        
      - name: Run Script
        continue-on-error: true
        run: node scripts/validate-staging.cjs > VALIDATION-RESULTS.txt
        env:
          STAGING_FIREBASE_SERVICE_ACCOUNT: ${{ secrets.STAGING_FIREBASE_SERVICE_ACCOUNT }}
          
      - name: Create Issue with Results
        run: |
          gh issue create --title "Staging Validation Results - $(date +'%s')" --body-file VALIDATION-RESULTS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
