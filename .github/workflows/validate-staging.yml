name: Validate Webhook Staging
on:
  push:
    branches:
      - main
    paths:
      - 'scripts/validate-staging.cjs'

jobs:
  validate:
    permissions:
      contents: write
      issues: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install firebase-admin
        
      - name: Run Script
        continue-on-error: true
        run: node scripts/validate-staging.cjs
        env:
          STAGING_FIREBASE_SERVICE_ACCOUNT: ${{ secrets.STAGING_FIREBASE_SERVICE_ACCOUNT }}
          
      - name: Commit Report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add P0-025B-FIRESTORE-PROOF-REPORT.md
          git commit -m "docs: add firestore proof report"
          git push
