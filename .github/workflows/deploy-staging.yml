name: Deploy Staging

on:
  push:
    branches:
      - staging

permissions:
  contents: read

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

  functions-ci:
    name: Functions CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'functions/package-lock.json'

      - name: Install Dependencies
        run: npm ci
        working-directory: ./functions

      - name: Build
        run: npm run build
        working-directory: ./functions

      - name: Unit Tests
        run: |
          node tests/functions/test-student-import-sweeper.cjs
          node tests/functions/test-student-import-lease.cjs
          node tests/functions/test-student-import-recovery.cjs
          node tests/functions/test-student-import-bulk-writer.cjs

  firestore-rules-ci:
    name: Firestore Rules CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Firebase Emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: ${{ runner.os }}-firebase-emulators-${{ hashFiles('firebase.json') }}
          restore-keys: |
            ${{ runner.os }}-firebase-emulators-

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Test Firestore Rules
        run: npm run test:rules
        env:
          FIREBASE_PROJECT: demo-ecoscolaire

  deploy-firebase:
    name: Deploy to Staging
    needs: [frontend-ci, functions-ci, firestore-rules-ci]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Functions Dependencies
        run: npm ci
        working-directory: ./functions

      - name: Build Functions
        run: npm run build
        working-directory: ./functions

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ECOSCOLAIRE_STAGING }}

      - name: Deploy Firebase Backend
        run: npx firebase-tools deploy --project ecoscolaire-staging --only functions,firestore:rules,storage
