name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # TODO(E3.1b): frontend lint debt (305 errors)
      # - name: Lint
      #   run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload Artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  functions-ci:
    name: Functions CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'functions/package-lock.json'

      - name: Install Dependencies
        run: npm ci
        working-directory: ./functions

      # TODO(E3.1b): functions ESLint flat config debt
      # - name: Lint
      #   run: npm run lint
      #   working-directory: ./functions

      - name: Build
        run: npm run build
        working-directory: ./functions

      - name: Unit Tests
        run: |
          node tests/functions/test-student-import-sweeper.cjs
          node tests/functions/test-student-import-lease.cjs
          node tests/functions/test-student-import-recovery.cjs
          node tests/functions/test-student-import-bulk-writer.cjs

      - name: Upload Artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: functions-lib
          path: functions/lib/
          retention-days: 7

  firestore-rules-ci:
    name: Firestore Rules CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Firebase Emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: ${{ runner.os }}-firebase-emulators-${{ hashFiles('firebase.json') }}
          restore-keys: |
            ${{ runner.os }}-firebase-emulators-

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Test Firestore Rules
        run: npm run test:rules
        env:
          FIREBASE_PROJECT: demo-ecoscolaire
